# Armored Core VI Archipelago - connection settings.
# Edit these to match your room, save, then relaunch through ModEngine2.
#   host     = Archipelago server address (e.g. archipelago.gg or localhost)
#   port     = room port number
#   slot     = your slot name, exactly as in your YAML
#   password = room password, or leave blank
host=archipelago.gg
port=38281
slot=Player1
password=

# --- Optional dev/debug toggles (leave at 0 for normal play) ---

# discover = 1 logs every event flag that changes to ac6ap_discovery.txt and
#            does NOT connect to Archipelago. Used to map missions to their
#            trigger flags. discover_ranges sets which flags to watch.
discover=0
#discover_ranges=3000-3500,4000-4100,6000-6500

# grant_all_parts = 1 enables an F7 hotkey: press F7 at the garage to add every
#                   AC part to your inventory (works in any mode).
grant_all_parts=0

# overlay = on-screen feed (top-left) of items received / checks completed.
#           On by default; set to 0 to disable it. Shows in borderless/windowed
#           mode, not exclusive fullscreen.
overlay=1
